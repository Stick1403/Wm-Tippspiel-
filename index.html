<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#070e1f;color:#f0f4ff;font-family:-apple-system,'SF Pro Display',system-ui,sans-serif;overscroll-behavior:none;min-height:100vh;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
input,button,select{font-family:inherit;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fade{animation:fadeUp .2s ease both}
.spin{animation:spin .8s linear infinite;display:inline-block}
.pulse{animation:pulse 1.5s infinite}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#1e2d45;border-radius:2px}

@keyframes ballRoll{0%{transform:translateX(-110vw) rotate(0deg) scale(1)}50%{transform:translateX(0) rotate(360deg) scale(1.1)}100%{transform:translateX(110vw) rotate(720deg) scale(1)}}
@keyframes hereWeGoIn{0%{opacity:0;transform:translateY(30px)}100%{opacity:1;transform:translateY(0)}}
@keyframes namePop{0%{opacity:0;transform:scale(0.3)}70%{transform:scale(1.2)}100%{opacity:1;transform:scale(1)}}
@keyframes overlayFadeOut{0%{opacity:1}100%{opacity:0}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes wmBallBounce{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-18px) rotate(180deg)}}
@keyframes wmBallSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

</style>

// HELPERS
// ═══════════════════════════════════════════
function isStarted(m){return new Date()>=new Date(m.utcDate);}
function isFinished(m){return["FINISHED","AWARDED"].includes(m.status)||!!m.manualResult;}
function isLive(m){return["IN_PLAY","PAUSED","HALFTIME"].includes(m.status);}

function getScore(m){
  if(m.manualResult)return{h:m.manualResult.h,a:m.manualResult.a};
  const fs=m.score&&m.score.fullTime;
  if(fs&&fs.home!=null)return{h:fs.home,a:fs.away};
  return null;
}

function getWinner(m){
  const s=getScore(m);
  if(!s||!isFinished(m))return null;
  if(s.h>s.a)return m.home;
  if(s.a>s.h)return m.away;
  const p=m.score&&m.score.penalties;
  if(p&&p.home!=null)return p.home>p.away?m.home:m.away;
  return null;
}

function getLoser(m){
  const s=getScore(m);
  if(!s||!isFinished(m))return null;
  if(s.h>s.a)return m.away;
  if(s.a>s.h)return m.home;
  return null;
}

function calcPts(hT,aT,hR,aR){
  if(hR==null||aR==null)return null;
  if(hT==null||aT==null||hT===""||aT==="")return 0;
  // 3 Punkte: exaktes Ergebnis
  if(+hT===+hR&&+aT===+aR)return 3;
  const tTend=+hT>+aT?1:+hT<+aT?-1:0;
  const rTend=+hR>+aR?1:+hR<+aR?-1:0;
  if(tTend!==rTend)return 0;
  // Richtige Tendenz – prüfe Tordifferenz
  const tDiff=(+hT)-(+aT);
  const rDiff=(+hR)-(+aR);
  // 2 Punkte: richtige Tendenz + gleiche Tordifferenz
  if(tDiff===rDiff)return 2;
  // 1 Punkt: nur richtige Tendenz
  return 1;
}

function fmtDt(utc){
  return new Date(utc).toLocaleString("de-DE",{weekday:"short",day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
}

function calcGroupTable(grp,matches){
  const teams=GROUPS[grp];
  const st={};
  teams.forEach(t=>{st[t]={team:t,played:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0};});
  matches.filter(m=>m.stage==="GROUP_STAGE"&&m.group===grp).forEach(m=>{
    const s=getScore(m);
    if(!s||!isFinished(m))return;
    const ht=m.home,at=m.away;
    if(!st[ht]||!st[at])return;
    st[ht].played++;st[at].played++;
    st[ht].gf+=s.h;st[ht].ga+=s.a;st[ht].gd+=s.h-s.a;
    st[at].gf+=s.a;st[at].ga+=s.h;st[at].gd+=s.a-s.h;
    if(s.h>s.a){st[ht].w++;st[ht].pts+=3;st[at].l++;}
    else if(s.a>s.h){st[at].w++;st[at].pts+=3;st[ht].l++;}
    else{st[ht].d++;st[at].d++;st[ht].pts++;st[at].pts++;}
  });
  const arr=Object.values(st);
  arr.sort((a,b)=>{
    if(b.pts!==a.pts)return b.pts-a.pts;
    if(b.gd!==a.gd)return b.gd-a.gd;
    return b.gf-a.gf;
  });
  return arr;
}

function buildMatches(){
  const{apiData,manualResults,dbMatches}=STATE;
  const byId={};
  apiData.forEach(a=>{byId[a.id]=a;});
  const mrById={};
  Object.entries(manualResults).forEach(([id,r])=>{mrById[+id]=r;});

  // Use SCHEDULE (patched with Supabase data by loadMatches)
  const schedule=SCHEDULE;

  let ms=schedule.map(s=>{
    const api=byId[s.id];
    return{
      ...s,
      home:s.home||null,away:s.away||null,
      status:api?api.status:"SCHEDULED",
      score:api?api.score:{fullTime:{home:null,away:null}},
      manualResult:mrById[s.id]||null,
    };
  });

  // Fill KO bracket
  const mById={};ms.forEach(m=>{mById[m.id]=m;});

  function resolveTeam(code){
    if(!code)return null;
    if(/^[12][A-L]$/.test(code)){
      const rank=code[0],grp=code[1];
      const t=calcGroupTable(grp,ms);
      return rank==="1"?(t[0]&&t[0].team)||null:(t[1]&&t[1].team)||null;
    }
    if(/^W\d+$/.test(code)){
      const mid=+code.slice(1);
      return getWinner(mById[mid]);
    }
    if(/^L\d+$/.test(code)){
      const mid=+code.slice(1);
      return getLoser(mById[mid]);
    }
    if(code==="3rd")return null; // simplified
    return null;
  }

  ms.filter(m=>m.stage!=="GROUP_STAGE").forEach(m=>{
    // Only auto-resolve if teams not already manually set in Supabase
    if(!m.home&&m.koH){const t=resolveTeam(m.koH);if(t)m.home=t;}
    if(!m.away&&m.koA){const t=resolveTeam(m.koA);if(t)m.away=t;}
    mById[m.id]=m;
  });

  // No deduplication needed - all IDs show different matches
  return ms.sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate));
}

function getTournamentWinner(matches){
  const fin=matches.find(m=>m.stage==="FINAL");
  if(!fin||!isFinished(fin))return null;
  return getWinner(fin);
}

function getUserPoints(name,matches){
  let pts=0;
  matches.forEach(m=>{
    if(!isFinished(m))return;
    const s=getScore(m);if(!s)return;
    const p=(STATE.picks[name]||{})[m.id];if(!p)return;
    pts+=(calcPts(p.h,p.a,s.h,s.a)||0);
  });
  const w=getTournamentWinner(matches);
  if(w&&STATE.champ[name]===w)pts+=10;
  var adminTs=STATE.champ["_ts_admin"];
  var userTs=STATE.champ["_ts_"+name];
  if(adminTs&&userTs&&adminTs===userTs)pts+=5;
  return pts;
}

async function loadAll(){
  try{
    const[u,p,ch,mr]=await Promise.all([
      sb.from("users").select("*"),
      sb.from("picks").select("*"),
      sb.from("champion_picks").select("*"),
      sb.from("manual_results").select("*"),
    ]);
    const dbUsers={};
    (u.data||[]).forEach(x=>{dbUsers[x.name]={pin:x.pin,at:x.created_at};});
    const picks={};
    (p.data||[]).forEach(x=>{
      if(!picks[x.user_name])picks[x.user_name]={};
      picks[x.user_name][x.match_id]={h:x.home_tip,a:x.away_tip};
    });
    const champ={};
    (ch.data||[]).forEach(x=>{champ[x.user_name]=x.team;});
    const manualResults={};
    (mr.data||[]).forEach(x=>{manualResults[x.match_id]={h:x.home_goals,a:x.away_goals};});
    const patch={dbUsers,picks,champ,manualResults,loading:false};
    // Preserve dbMatches if already loaded
    if(STATE.dbMatches&&STATE.dbMatches.length>0)patch.dbMatches=STATE.dbMatches;
    if(STATE.user&&!STATE.isAdmin){
      var afterDay1=new Date()>=new Date("2026-06-17T23:59:00Z");
      patch.champRequired=!champ[STATE.user];
      patch.scorerRequired=afterDay1&&!champ["_ts_"+STATE.user];
    }
    setState(patch);
  }catch(e){
    console.error(e);
    setState({loading:false});
  }
}

async function loadMatches(){
  try{
    const ms=await sb.from("matches").select("id,home,away,utc_date").not("home","is",null);
    if(!ms.data||ms.data.length===0)return;
    ms.data.forEach(x=>{
      const s=SCHEDULE.find(m=>m.id===x.id);
      if(s){
        if(x.home)s.home=x.home;
        if(x.away)s.away=x.away;
        if(x.utc_date)s.utcDate=x.utc_date;
      }
    });
    render();
  }catch(e){
    console.error("matches load failed:",e);
  }
}

function setupRealtime(){
  sb.channel("changes")
    .on("postgres_changes",{event:"*",schema:"public",table:"picks"},loadAll)
    .on("postgres_changes",{event:"*",schema:"public",table:"users"},loadAll)
    .on("postgres_changes",{event:"*",schema:"public",table:"champion_picks"},loadAll)
    .on("postgres_changes",{event:"*",schema:"public",table:"manual_results"},loadAll)
    .on("postgres_changes",{event:"*",schema:"public",table:"matches"},loadAll)
    .subscribe();
}

// Football API
let lastFetch=0;
async function fetchAPI(force){
  if(!force&&Date.now()-lastFetch<REFRESH_MS)return;
  setState({syncing:true});
  try{
    const r=await fetch(`https://api.football-data.org/v4/competitions/${COMP_ID}/matches`,{headers:{"X-Auth-Token":FB_KEY}});
    if(!r.ok)throw new Error(r.status);
    const d=await r.json();
    if(d.matches&&d.matches.length){
      lastFetch=Date.now();
      setState({apiData:d.matches,syncing:false,syncMsg:"✓ Live"});
    }else setState({syncing:false,syncMsg:"● Fallback"});
  }catch{setState({syncing:false,syncMsg:"● Offline"});}
  setTimeout(()=>setState({syncMsg:""}),4000);
}

async function doLogin(name,pin){
  if(name===ADMIN_NAME&&pin===ADMIN_PIN){
    saveSession(ADMIN_NAME,true);
    showHereWeGo(ADMIN_NAME,function(){setState({user:ADMIN_NAME,isAdmin:true,tab:"spiele"});});return;
  }
  if(pin.length!==4||!/^\d{4}$/.test(pin))return showToast("PIN muss 4 Ziffern haben",C.red);
  var res=await sb.from("users").select("pin").eq("name",name).single();
  if(!res.data)return showToast("Unbekannt – bitte registrieren",C.red);
  if(res.data.pin!==pin)return showToast("Falscher PIN",C.red);
  var needChamp=!STATE.champ[name];
  var afterDay1=new Date()>=new Date("2026-06-17T23:59:00Z");
  var needScorer=afterDay1&&!STATE.champ["_ts_"+name];
  var startTab=needChamp?"sieger":needScorer?"torschuetze":"spiele";
  saveSession(name,false);
  showHereWeGo(name,function(){setState({user:name,isAdmin:false,tab:startTab,champRequired:needChamp,scorerRequired:needScorer});});
}

async function doRegister(name,pin){
  if(name===ADMIN_NAME)return showToast("Name reserviert",C.red);
  if(pin.length!==4||!/^\d{4}$/.test(pin))return showToast("PIN muss 4 Ziffern haben",C.red);
  var ex=await sb.from("users").select("id").eq("name",name).single();
  if(ex.data)return showToast("Name vergeben",C.red);
  var ins=await sb.from("users").insert({name:name,pin:pin});
  if(ins.error)return showToast("Fehler beim Registrieren",C.red);
  var newUsers=Object.assign({},STATE.dbUsers);newUsers[name]={pin:pin,at:new Date().toISOString()};
  saveSession(name,false);
  showHereWeGo(name,function(){setState({user:name,isAdmin:false,tab:"sieger",champRequired:true,scorerRequired:false,dbUsers:newUsers});});
}

// RENDER ENGINE (vanilla JS DOM)
// ═══════════════════════════════════════════
function el(tag,props,children){
  const e=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==="style")Object.assign(e.style,v);
    else if(k==="class")e.className=v;
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="html")e.innerHTML=v;
    else e.setAttribute(k,v);
  });
  if(children){
    (Array.isArray(children)?children:[children]).forEach(c=>{
      if(c==null||c===false)return;
      e.appendChild(typeof c==="string"?document.createTextNode(c):c);
    });
  }
  return e;
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  app.appendChild(buildApp());
}

function buildApp(){
  const{loading,user,isAdmin,tab,toast,champRequired,champ}=STATE;

  if(loading){
    return el("div",{style:{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:"16px"}},[
      el("div",{style:{fontSize:"48px"}},"⚽"),
      el("div",{style:{fontSize:"14px",color:C.muted}},"Laden..."),
    ]);
  }

  if(!user)return buildLogin();

  const matches=buildMatches();
  const tournamentWinner=getTournamentWinner(matches);

  const wrap=el("div",{style:{minHeight:"100vh",background:C.bg,paddingBottom:"72px"}});

  // Header
  wrap.appendChild(buildHeader());

  // Champion banner
  if(champRequired&&!champ[user]&&tab!=="sieger"){
    const banner=el("div",{style:{background:"rgba(245,166,35,0.1)",borderBottom:"1px solid rgba(245,166,35,0.3)",padding:"10px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:"10px"},onClick:()=>setState({tab:"sieger"})});
    banner.appendChild(el("span",{style:{fontSize:"18px"}},"👑"));
    const t=el("div");
    t.appendChild(el("div",{style:{fontSize:"13px",fontWeight:"700",color:C.gold}},"Weltmeister-Tipp fehlt!"));
    t.appendChild(el("div",{style:{fontSize:"11px",color:C.muted}},"Pflicht vor dem ersten Spieltipp → 5 Bonuspunkte"));
    banner.appendChild(t);
    wrap.appendChild(banner);
  }

  // Content
  const content=el("div",{style:{maxWidth:"540px",margin:"0 auto",padding:"14px 12px 0"}});
  if(tab==="spiele")content.appendChild(buildSpiele(matches));
  else if(tab==="gruppen")content.appendChild(buildGruppen(matches));
  else if(tab==="rangliste")content.appendChild(buildRangliste(matches,tournamentWinner));
  else if(tab==="sieger")content.appendChild(buildSieger(matches,tournamentWinner));
        if(tab==="torschuetze")content.appendChild(buildTorschuetze());
        if(tab==="regeln")content.appendChild(buildRegeln());
  else if(tab==="admin"&&isAdmin)content.appendChild(buildAdmin(matches));
  wrap.appendChild(content);

  // Bottom nav
  wrap.appendChild(buildNav());

// SPIELE
// ═══════════════════════════════════════════
function buildSpiele(matches){
  const{filterSpiele,picks,user}=STATE;
  const wrap=el("div",{class:"fade"});

  // Stats
  const stats=el("div",{style:{display:"flex",gap:"8px",marginBottom:"14px"}});
  const openC=matches.filter(m=>!isStarted(m)).length;
  const myC=Object.keys(picks[user]||{}).length;
  const liveC=matches.filter(m=>isLive(m)).length;
  [{l:"Offen",v:openC,c:C.blue},{l:"Getippt",v:myC,c:C.green},{l:"Live",v:liveC,c:C.red}].forEach(s=>{
    const card=el("div",{style:{flex:"1",background:C.s2,border:"1px solid "+C.border,borderRadius:"12px",padding:"10px 8px",textAlign:"center"}});
    card.appendChild(el("div",{style:{fontSize:"20px",fontWeight:"900",color:s.c}},String(s.v)));
    card.appendChild(el("div",{style:{fontSize:"10px",color:C.muted,fontWeight:"600"}},s.l.toUpperCase()));
    stats.appendChild(card);
  });
  wrap.appendChild(stats);

  // Filter
  const filters=el("div",{style:{display:"flex",gap:"6px",marginBottom:"14px",overflowX:"auto",paddingBottom:"2px"}});
  [["alle","Alle"],["offen","Offen"],["live","🔴 Live"],["fertig","Fertig"]].forEach(([v,l])=>{
    const active=filterSpiele===v;
    const btn=el("button",{
      style:{background:active?C.gold:C.s2,color:active?"#070e1f":C.mutedB,border:"1px solid "+(active?C.gold:C.border),borderRadius:"99px",padding:"7px 16px",fontSize:"13px",fontWeight:active?"800":"400",cursor:"pointer",whiteSpace:"nowrap",flexShrink:"0"},
      onClick:()=>setState({filterSpiele:v})
    },l);
    filters.appendChild(btn);
  });
  wrap.appendChild(filters);

  // Grouped matches
  const filtered=matches.filter(m=>{
    if(filterSpiele==="offen")return!isStarted(m);
    if(filterSpiele==="live")return isLive(m);
    if(filterSpiele==="fertig")return isFinished(m);
    return true;
  });
  const grouped={};
  filtered.forEach(m=>{if(!grouped[m.stage])grouped[m.stage]=[];grouped[m.stage].push(m);});

  STAGE_ORDER.forEach(stage=>{
    if(!grouped[stage])return;
    const div=el("div",{style:{marginBottom:"4px"}});
    const hdr=el("div",{style:{fontSize:"11px",fontWeight:"800",color:C.gold,textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:"8px",marginTop:"4px",display:"flex",alignItems:"center",gap:"8px"}});
    hdr.appendChild(el("div",{style:{flex:"1",height:"1px",background:"linear-gradient(90deg,rgba(245,166,35,.4),transparent)"}}));
    hdr.appendChild(document.createTextNode(STAGE_DE[stage]));
    hdr.appendChild(el("div",{style:{flex:"1",height:"1px",background:"linear-gradient(270deg,rgba(245,166,35,.4),transparent)"}}));
    div.appendChild(hdr);
    grouped[stage].forEach(m=>div.appendChild(buildMatchCard(m)));
    wrap.appendChild(div);
  });

  if(!filtered.length){
    const empty=el("div",{style:{textAlign:"center",color:C.muted,padding:"48px 0"}});
    empty.appendChild(el("div",{style:{fontSize:"32px",marginBottom:"8px"}},"📭"));
    empty.appendChild(document.createTextNode("Keine Spiele."));
    wrap.appendChild(empty);
  }
  return wrap;
}

function buildMatchCard(m){
  const{picks,user,showOthers}=STATE;
  const started=isStarted(m);
  const finished=isFinished(m);
  const live=isLive(m);
  const score=getScore(m);
  const myPick=(picks[user]||{})[m.id];
  const hasTip=myPick&&myPick.h!=null&&myPick.a!=null;
  const myPts=finished&&score?calcPts(myPick&&myPick.h,myPick&&myPick.a,score.h,score.a):null;
  const canTip=!started&&!finished;

  const borderColor=live?C.red:finished?C.border:hasTip?"rgba(0,196,140,0.4)":C.borderB;
  const card=el("div",{style:{background:C.s2,border:"1px solid "+borderColor,borderRadius:"18px",padding:"14px 16px",marginBottom:"10px"}});

  // Meta row
  const meta=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}});
  meta.appendChild(el("span",{style:{fontSize:"11px",color:C.muted}},fmtDt(m.utcDate)+(m.group?" · Gr."+m.group:"")));
  const badges=el("div",{style:{display:"flex",gap:"6px",alignItems:"center"}});
  if(m.manualResult)badges.appendChild(el("span",{style:{fontSize:"9px",color:C.gold,fontWeight:"700"}},"ADMIN"));
  if(finished)badges.appendChild(el("span",{style:{background:"rgba(0,196,140,0.12)",color:C.green,borderRadius:"99px",padding:"3px 10px",fontSize:"11px",fontWeight:"700"}},"Fertig"));
  else if(live)badges.appendChild(el("span",{class:"pulse",style:{background:"rgba(255,77,106,0.12)",color:C.red,borderRadius:"99px",padding:"3px 10px",fontSize:"11px",fontWeight:"700"}},"● Live"));
  else badges.appendChild(el("span",{style:{background:"rgba(74,158,255,0.12)",color:C.blue,borderRadius:"99px",padding:"3px 10px",fontSize:"11px",fontWeight:"700"}},"Offen"));
  meta.appendChild(badges);
  card.appendChild(meta);

  // Teams row
  const teams=el("div",{style:{display:"flex",alignItems:"center",gap:"8px"}});
  (function(){var hs=document.createElement("span");hs.style.cssText="flex:1;font-size:13px;font-weight:700;line-height:1.3;";hs.textContent=getFlag(m.home||"")+" "+(m.home||"?");teams.appendChild(hs);})();

  if(finished&&score){
    const sc=el("div",{style:{display:"flex",alignItems:"center",gap:"8px",flexShrink:"0"}});
    sc.appendChild(el("span",{style:{fontSize:"26px",fontWeight:"900",minWidth:"28px",textAlign:"center"}},String(score.h)));
    sc.appendChild(el("span",{style:{color:C.muted,fontSize:"14px",fontWeight:"700"}},":"));
    sc.appendChild(el("span",{style:{fontSize:"26px",fontWeight:"900",minWidth:"28px",textAlign:"center"}},String(score.a)));
    teams.appendChild(sc);
  } else {
    const inputs=el("div",{style:{display:"flex",alignItems:"center",gap:"6px",flexShrink:"0"}});
    const hIn=el("input",{type:"number",inputmode:"numeric",min:"0",max:"20",
      style:{width:"50px",background:canTip?C.s3:"#060d1a",border:"2px solid "+(canTip?C.gold:C.border),borderRadius:"11px",padding:"10px 4px",color:canTip?C.text:C.muted,fontSize:"22px",fontWeight:"900",textAlign:"center",outline:"none"},
      value:hasTip?String(myPick.h):"",
    });
    if(!canTip)hIn.disabled=true;
    const aIn=el("input",{type:"number",inputmode:"numeric",min:"0",max:"20",
      style:{width:"50px",background:canTip?C.s3:"#060d1a",border:"2px solid "+(canTip?C.gold:C.border),borderRadius:"11px",padding:"10px 4px",color:canTip?C.text:C.muted,fontSize:"22px",fontWeight:"900",textAlign:"center",outline:"none"},
      value:hasTip?String(myPick.a):"",
    });
    if(!canTip)aIn.disabled=true;
    inputs.appendChild(hIn);
    inputs.appendChild(el("span",{style:{color:C.muted,fontSize:"16px",fontWeight:"700"}},":"));
    inputs.appendChild(aIn);
    teams.appendChild(inputs);

    if(canTip){
      card._hIn=hIn;card._aIn=aIn;
    }
  }

  (function(){var as=document.createElement("span");as.style.cssText="flex:1;font-size:13px;font-weight:700;text-align:right;line-height:1.3;";as.textContent=(m.away||"?")+" "+getFlag(m.away||"");teams.appendChild(as);})();
  card.appendChild(teams);

  // Result section
  const hasOthers=Object.entries(STATE.picks).some(([u,mp])=>u!==user&&mp[m.id]!=null);
  if(finished||(started&&hasOthers)){
    const res=el("div",{style:{marginTop:"12px",borderTop:"1px solid "+C.border,paddingTop:"10px"}});
    if(finished){
    const tipRow=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}});
    const tipText=el("div",{style:{fontSize:"13px"}});
    tipText.appendChild(el("span",{style:{color:C.muted}},"Dein Tipp: "));
    if(hasTip)tipText.appendChild(el("span",{style:{fontWeight:"700"}},myPick.h+" : "+myPick.a));
    else tipText.appendChild(el("span",{style:{color:C.red,fontWeight:"600"}},"🍆🍑 kein Tipp"));
    tipRow.appendChild(tipText);
    if(myPts!==null){
      const ptsColor=myPts===3?C.green:myPts===2?C.blue:myPts===1?C.gold:C.red;
      const ptsBg=myPts===3?"rgba(0,196,140,0.12)":myPts===2?"rgba(74,158,255,0.12)":myPts===1?"rgba(245,166,35,0.15)":"rgba(255,77,106,0.12)";
      const ptsIcon=myPts===3?"🎉":myPts===2?"✌🏻":myPts===1?"👍🏻":"🍆🍑";
      tipRow.appendChild(el("span",{style:{background:ptsBg,color:ptsColor,borderRadius:"99px",padding:"4px 12px",fontSize:"12px",fontWeight:"800"}},ptsIcon+" "+(myPts>0?"+"+myPts+" Pkt":"0 Pkt")));
    }
    res.appendChild(tipRow);
    }

    // Others toggle
    const othersKey=m.id;
    if(hasOthers){
      const expanded=STATE.showOthers[othersKey];
      const tog=el("button",{style:{background:"none",border:"none",cursor:"pointer",color:C.mutedB,fontSize:"12px",fontWeight:"600",padding:"0",display:"flex",alignItems:"center",gap:"4px"},
        onClick:()=>{
          const so=Object.assign({},STATE.showOthers);
          so[othersKey]=!so[othersKey];
          setState({showOthers:so});
        }
      });
      tog.appendChild(el("span",{style:{transition:"transform .2s",display:"inline-block",transform:expanded?"rotate(90deg)":"rotate(0deg)"}},">"));
      tog.appendChild(document.createTextNode(" Mitspieler "+(expanded?"ausblenden":"anzeigen")));
      res.appendChild(tog);

      if(expanded){
        const othersDiv=el("div",{style:{marginTop:"8px",display:"flex",flexWrap:"wrap",gap:"6px"}});
        Object.entries(STATE.picks).forEach(([u,mp])=>{
          if(u===user)return;
          const p=mp[m.id];if(!p)return;
          const pts=score?calcPts(p.h,p.a,score.h,score.a):null;
          const chip=el("div",{style:{background:C.s3,border:"1px solid "+C.border,borderRadius:"9px",padding:"6px 11px",fontSize:"12px"}});
          chip.appendChild(el("span",{style:{color:C.muted}},u+": "));
          chip.appendChild(el("span",{style:{fontWeight:"700"}},p.h+":"+p.a));
          if(pts!==null){const ptsIcon=pts===3?"🎉":pts===2?"✌🏻":pts===1?"👍🏻":"🍆🍑";chip.appendChild(el("span",{style:{color:pts>0?C.green:C.red,marginLeft:"5px",fontWeight:"700"}},ptsIcon+" ("+pts+"P)"));}
          othersDiv.appendChild(chip);
        });
        res.appendChild(othersDiv);
      }
    }
    card.appendChild(res);
  }

  // Save button
  if(canTip){
    const btn=el("button",{
      style:{width:"100%",background:"#1a2540",color:C.muted,border:"none",borderRadius:"12px",padding:"12px",fontSize:"14px",fontWeight:"800",cursor:"pointer",marginTop:"12px"},
      onClick:()=>{
        const h=card._hIn?card._hIn.value:"";
        const a=card._aIn?card._aIn.value:"";
        if(h!==""&&a!=="")doSavePick(m.id,h,a);
      }
    },hasTip?"✓ Tipp aktualisieren":"Tipp speichern");
    // Style update based on values
    const updateBtn=()=>{
      const h=card._hIn?card._hIn.value:"";
      const a=card._aIn?card._aIn.value:"";
      const filled=h!==""&&a!=="";
      btn.style.background=filled?"linear-gradient(135deg,"+C.gold+","+C.goldD+")":"#1a2540";
      btn.style.color=filled?"#070e1f":C.muted;
    };
    if(card._hIn){card._hIn.addEventListener("input",updateBtn);card._aIn.addEventListener("input",updateBtn);}
    card.appendChild(btn);
  }
  if(started&&!finished){
    const closed=el("div",{class:"pulse",style:{marginTop:"10px",fontSize:"12px",color:C.red,textAlign:"center",fontWeight:"600"}},"⏱ Tippabgabe geschlossen");
    card.appendChild(closed);
  }

  return card;
}

// ═══════════════════════════════════════════
// RANGLISTE
// ═══════════════════════════════════════════
function buildRangliste(matches,tournamentWinner){
  const{dbUsers,picks,champ,user,manualResults}=STATE;
  const ranking=Object.keys(dbUsers).map(n=>{
    const myPicks=picks[n]||{};
    const played=matches.filter(m=>manualResults[m.id]);
    let exact=0,diff=0,tend=0,total=0;
    played.forEach(m=>{
      const p=myPicks[m.id];if(!p)return;
      const r=manualResults[m.id];total++;
      if(p.h===r.h&&p.a===r.a)exact++;
      else if((p.h-p.a)===(r.h-r.a))diff++;
      else if((p.h>p.a&&r.h>r.a)||(p.h<p.a&&r.h<r.a)||(p.h===p.a&&r.h===r.a))tend++;
    });
    const quote=total>0?Math.round(((exact+diff+tend)/total)*100):0;
    return {name:n,pts:getUserPoints(n,matches),tips:Object.keys(myPicks).length,exact,diff,tend,total,quote};

  const sys=el("div",{style:{background:C.s2,border:"1px solid "+C.border,borderRadius:"18px",padding:"16px"}});

  [["✅","Richtiges Ergebnis","3 Pkt",C.green],["🎯","Tendenz + gleiche Differenz","2 Pkt",C.blue],["↔️","Richtige Tendenz","1 Pkt",C.gold],["👑","Richtiger Weltmeister","10 Pkt",C.purple],["⚽","Richtiger Torschützenkönig","5 Pkt",C.green],["🍆🍑","Falscher Tipp / kein Tipp (Schwanz in dein Arsch)","0 Pkt",C.red]].forEach(([ic,lb,pt,co],i,arr)=>{

    const searchIn=el("input",{type:"text",placeholder:"🔍 Team suchen...",
      style:{width:"100%",background:C.s2,border:"1px solid "+C.border,borderRadius:"13px",padding:"13px 15px",color:C.text,fontSize:"15px",outline:"none",marginBottom:"12px"}
    });
    wrap.appendChild(searchIn);
    const list=el("div",{style:{display:"flex",flexDirection:"column",gap:"6px"}});

    function renderTeams(filter){
      list.innerHTML="";
      ALL_TEAMS.filter(t=>t.toLowerCase().includes(filter.toLowerCase())).forEach(team=>{
        const active=myPick===team;
        const btn=el("button",{
          style:{background:active?"linear-gradient(135deg,"+C.gold+","+C.goldD+")":C.s2,color:active?"#070e1f":C.text,border:"1px solid "+(active?C.gold:C.border),borderRadius:"13px",padding:"13px 16px",textAlign:"left",fontSize:"14px",fontWeight:active?"800":"400",cursor:"pointer",display:"flex",alignItems:"center",gap:"8px",width:"100%"},

    matchSel.appendChild(el("option",{value:""},"Spiel auswählen…"));

      if(m){
        homeIn.value=m.home||"";
        awayIn.value=m.away||"";
        const dt=new Date(m.utcDate);

        dateIn.value=de.toISOString().slice(0,16);

      style:{width:"100%",background:C.gold,color:"#0a0a0a",border:"none",borderRadius:"12px",padding:"13px",fontSize:"14px",fontWeight:"800",cursor:"pointer"},

          const local=new Date(dateIn.value);

  var adminPick=STATE.champ["_ts_admin"]||null;
  var deadline=new Date("2026-06-17T23:59:00Z");
  var locked=new Date()>=deadline;

  var wrap=el("div",{class:"fade"});
  wrap.appendChild(el("div",{style:{fontSize:"18px",fontWeight:"900",marginBottom:"4px"}},"⚽ Torschützenkönig"));
  wrap.appendChild(el("div",{style:{fontSize:"13px",color:C.muted,marginBottom:"16px"}},"5 Bonuspunkte · Tippbar bis 1. Spieltag (17. Juni)"));

    var won=myPick===adminPick;
    var winBox=el("div",{style:{background:"rgba(0,196,140,0.12)",border:"1px solid rgba(0,196,140,.3)",borderRadius:"16px",padding:"16px",marginBottom:"14px"}});

    var ws=el("div",{style:{fontSize:"13px",color:C.muted,marginTop:"4px"}});ws.textContent=won?"✓ Dein Tipp war richtig! +5 Punkte 🎉":"Dein Tipp: "+(myPick||"keiner");
    winBox.appendChild(wt);winBox.appendChild(ws);wrap.appendChild(winBox);
  }

  if(myPick&&!adminPick){
    var cur=el("div",{style:{background:"rgba(0,196,140,0.12)",border:"1px solid rgba(0,196,140,.25)",borderRadius:"14px",padding:"13px 16px",marginBottom:"14px",display:"flex",alignItems:"center",gap:"10px"}});
    cur.appendChild(el("span",{style:{fontSize:"22px"}},"⚽"));
    var ct=el("div");
    var cl=el("div",{style:{fontSize:"11px",color:C.muted,fontWeight:"600"}});cl.textContent="DEIN TIPP";
    var cv=el("div",{style:{fontWeight:"800",fontSize:"16px",color:C.green}});cv.textContent=myPick;
    ct.appendChild(cl);ct.appendChild(cv);cur.appendChild(ct);
    if(!locked){var cm=el("span",{style:{marginLeft:"auto",fontSize:"12px",color:C.muted}});cm.textContent="Änderbar bis 17. Juni";cur.appendChild(cm);}
    wrap.appendChild(cur);
  }

  if(locked&&!adminPick){
    var lb=el("div",{style:{background:C.s2,border:"1px solid "+C.border,borderRadius:"14px",padding:"20px",textAlign:"center",color:C.muted}});
    lb.textContent="🔒 Tippabgabe geschlossen – Gruppenphase beendet.";
    wrap.appendChild(lb);
    return wrap;

  if(!locked){
    var searchIn=document.createElement("input");
    searchIn.type="text";searchIn.placeholder="🔍 Land oder Spieler suchen...";
    searchIn.style.cssText="width:100%;background:"+C.s2+";border:1px solid "+C.border+";border-radius:13px;padding:13px 15px;color:"+C.text+";font-size:15px;outline:none;margin-bottom:12px;font-family:inherit;";
    wrap.appendChild(searchIn);

    var teamDiv=document.createElement("div");
    var playerDiv=document.createElement("div");
    wrap.appendChild(teamDiv);wrap.appendChild(playerDiv);
    var selTeam=null;

    function renderTeams(filter){
      teamDiv.innerHTML="";playerDiv.innerHTML="";selTeam=null;
      var teams=Object.keys(SQUADS).filter(function(t){return !filter||t.toLowerCase().indexOf(filter.toLowerCase())>=0;});
      var grid=document.createElement("div");
      grid.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:6px;";
      teams.forEach(function(team){
        var btn=document.createElement("button");
        btn.style.cssText="background:"+C.s2+";color:"+C.text+";border:1px solid "+C.border+";border-radius:12px;padding:11px 10px;text-align:left;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;";

      });

    function renderPlayers(team){
      teamDiv.innerHTML="";playerDiv.innerHTML="";
      var back=document.createElement("button");
      back.style.cssText="background:"+C.s2+";border:1px solid "+C.border+";border-radius:10px;padding:8px 14px;color:"+C.mutedB+";font-size:13px;font-weight:600;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;gap:6px;font-family:inherit;";
      back.textContent="← "+team;
      back.onclick=function(){renderTeams(searchIn.value);};
      playerDiv.appendChild(back);
      var players=SQUADS[team]||[];
      var list=document.createElement("div");
      list.style.cssText="display:flex;flex-direction:column;gap:6px;";
      players.forEach(function(p){
        var fullName=p+" ("+team+")";
        var active=myPick===fullName;
        var btn=document.createElement("button");
        btn.style.cssText="background:"+(active?"linear-gradient(135deg,"+C.gold+","+C.goldD+")":C.s2)+";color:"+(active?"#070e1f":C.text)+";border:1px solid "+(active?C.gold:C.border)+";border-radius:12px;padding:12px 16px;text-align:left;font-size:14px;font-weight:"+(active?"800":"400")+";cursor:pointer;font-family:inherit;";
        btn.textContent=(active?"✓ ":"")+p;
        btn.onclick=async function(){
          myPick=fullName;
          var nc=Object.assign({},STATE.champ);nc["_ts_"+user]=fullName;
          STATE.champ=nc;
          await sb.from("champion_picks").upsert({user_name:"_ts_"+user,team:fullName},{onConflict:"user_name"});
          showToast("⚽ "+p+" getippt!");
          setState({champ:nc});
        };
        list.appendChild(btn);
      });
      playerDiv.appendChild(list);
    }

    renderTeams("");
    searchIn.addEventListener("input",function(){if(!selTeam)renderTeams(searchIn.value);});
  }
  return wrap;
}

// Restore session (if user didn't log out, stay logged in across reloads)
(function(){
  var saved=loadSession();
  if(saved&&saved.user){
    STATE.user=saved.user;
    STATE.isAdmin=!!saved.isAdmin;
  }
})();

render();
loadAll();
loadMatches();
setupRealtime();
fetchAPI();
setInterval(()=>fetchAPI(true),REFRESH_MS);
document.addEventListener("visibilitychange",()=>{if(!document.hidden)fetchAPI();});
</script>
</body>
</html>
